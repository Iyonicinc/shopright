<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Product Details</h1>
</header>

<section id="product-details">
    <div class="product-image">
        <img src="images/laptop.jpg" alt="Dell Laptop">
    </div>
    <div class="product-info">
        <h2>Dell Inspiron 15</h2>
        <p>$800</p>
        <p>This laptop features an Intel Core i7 processor, 16GB RAM, and a 512GB SSD. Perfect for work and entertainment.</p>
        <button class="add-to-cart">Add to Cart</button>
        <button class="whatsapp">WhatsApp</button>
    </div>
</section>

<div class="reviews">
    <h3>Customer Reviews</h3>
    <p>⭐⭐⭐⭐☆</p>
    <p>"Great product, very fast delivery!"</p>
    <p>— John Doe</p>
</div>

</body>
</html>
