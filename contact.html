<!-- /pages/contact.html -->
<section id="contact" class="py-8 px-4 bg-gray-100">
    <!-- Section Title -->
    <h2 class="text-3xl font-bold text-center mb-8 text-gray-900">Contact Us</h2>

    <div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md">
        <!-- Contact Information -->
        <p class="text-lg mb-4 text-gray-700">Phone: <span class="font-medium">+25442606408</span></p>
        <p class="text-lg mb-6 text-gray-700">Email: <a href="mailto:support@shopright.com" class="text-blue-500 hover:underline">support@shopright.com</a></p>
        
        <!-- Contact Form -->
        <form class="space-y-6">
            <!-- Name Input -->
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="John Doe" class="block w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <!-- Email Input -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Your Email:</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" class="block w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <!-- Message Input -->
            <div>
                <label for="message" class="block text-sm font-medium text-gray-700">Message:</label>
                <textarea id="message" name="message" rows="4" placeholder="Enter your message here" class="block w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition duration-200">
                Send Message
            </button>
        </form>
    </div>
</section>
