<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopRightKenya</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Updated Header Section -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>ShopRightKenya</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#laptops"><strong>Laptops</strong></a></li>
                    <li><a href="#phones"><strong>Mobile Phones</strong></a></li>
                    <li><a href="#tv"><strong>TVs</strong></a></li>
                    <li><a href="#accessories"><strong>Accessories</strong></a></li>
                </ul>
            </nav>
            <div class="search-bar">
                <form action="/search" method="GET">
                    <input type="text" name="q" placeholder="Search...">
                    <button type="submit">Search</button>
                </form>
            </div>
            <div class="user-account">
                <a href="/login">Login</a> | <a href="/register">Register</a>
            </div>
            <div class="cart">
                <a href="/cart">
                    <img src="images/cart-icon.png" alt="Cart">
                    <span>2 items</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Rest of the body content -->
    <!-- (Carousel, products, etc.) -->

</body>
</html>
