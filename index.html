<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header with Categories</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to the external CSS file -->
</head>
<body>

<header>
    <!-- Logo Section -->
    <div class="logo">
        <img src="https://via.placeholder.com/50" alt="Logo">
    </div>

    <!-- Navigation Section -->
    <nav>
        <!-- Phones Category -->
        <div class="dropdown">
            <a href="#" class="dropdown-btn">Phones</a>
            <div class="dropdown-content">
                <a href="#">Samsung</a>
                <a href="#">Redmi</a>
                <a href="#">Infinix</a>
                <a href="#">Oppo</a>
            </div>
        </div>

        <!-- Laptops Category -->
        <div class="dropdown">
            <a href="#" class="dropdown-btn">Laptops</a>
            <div class="dropdown-content">
                <a href="#">HP</a>
                <a href="#">Lenovo</a>
                <a href="#">Dell</a>
            </div>
        </div>

        <!-- TVs Category -->
        <div class="dropdown">
            <a href="#" class="dropdown-btn">TVs</a>
            <div class="dropdown-content">
                <a href="#">Samsung</a>
                <a href="#">Hisense</a>
                <a href="#">TCL</a>
            </div>
        </div>
    </nav>

    <!-- Search Bar Section -->
    <div class="search-bar">
        <input type="text" placeholder="Search...">
        <button type="submit">&#128269;</button>
    </div>
</header>

</body>
</html>
