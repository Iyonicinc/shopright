<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopRightKenya</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo">
            <h1>ShopRightKenya</h1>
        </div>
        <form action="/search" method="GET" class="search-bar">
            <input type="text" name="q" placeholder="Search for products...">
            <button type="submit">Search</button>
        </form>
        <div class="user-account">
            <a href="/login">Login</a> | <a href="/register">Register</a>
        </div>
        <nav>
            <ul>
                <li><a href="#laptops"><strong>Laptops</strong></a></li>
                <li><a href="#phones"><strong>Mobile Phones</strong></a></li>
                <li><a href="#tv"><strong>TVs</strong></a></li>
                <li><a href="#accessories"><strong>Accessories</strong></a></li>
            </ul>
        </nav>
        <div class="cart">
            <a href="/cart">
                <img src="images/cart-icon.png" alt="Cart">
                <span>2 items</span>
            </a>
        </div>
    </header>

    <!-- Carousel Section -->
    <section id="featured-products">
        <h2>Featured Products</h2>
        <div class="carousel">
            <div class="featured-product">
                <img src="images/laptop.jpg" alt="Dell Laptop">
                <h3>Dell Inspiron 15</h3>
                <p>$800</p>
                <button class="add-to-cart">Add to Cart</button>
                <button class="whatsapp">WhatsApp</button>
            </div>
            <div class="featured-product">
                <img src="images/phone.jpg" alt="iPhone 12">
                <h3>iPhone 12</h3>
                <p>$999</p>
                <button class="add-to-cart">Add to Cart</button>
                <button class="whatsapp">WhatsApp</button>
            </div>
        </div>
    </section>

    <!-- Filters Section -->
    <div class="filters">
        <label for="category">Category:</label>
        <select id="category">
            <option value="laptops">Laptops</option>
            <option value="phones">Phones</option>
        </select>
        <label for="price">Price Range:</label>
        <input type="range" id="price" min="100" max="2000">
        <button type="button">Apply Filters</button>
    </div>

    <!-- Products Section -->
    <section id="products">
        <h2>All Products</h2>
        <div class="product-list">
            <div class="product">
                <img src="images/samsung-tv.jpg" alt="Samsung TV">
                <h3>Samsung 55-Inch TV</h3>
                <p>$700</p>
                <button class="add-to-cart">Add to Cart</button>
                <button class="whatsapp">WhatsApp</button>
            </div>
            <div class="product">
                <img src="images/earbuds.jpg" alt="Wireless Earbuds">
                <h3>Wireless Earbuds</h3>
                <p>$50</p>
                <button class="add-to-cart">Add to Cart</button>
                <button class="whatsapp">WhatsApp</button>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <div class="newsletter-signup">
            <h3>Subscribe to our Newsletter</h3>
            <form action="/subscribe" method="POST">
                <input type="email" name="email" placeholder="Your Email">
                <button type="submit">Subscribe</button>
            </form>
        </div>

        <div class="social-media">
            <a href="https://facebook.com/yourstore" target="_blank">Facebook</a>
            <a href="https://instagram.com/yourstore" target="_blank">Instagram</a>
        </div>
    </footer>
    
</body>
</html>
